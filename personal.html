<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilutegu – Töötaja vaba päev</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="style.css">
<style>
.staff-wrap { max-width: 560px; margin: 60px auto; padding: 0 24px; }
.staff-wrap h1 { font-size: 2rem; text-align: center; margin-bottom: 6px; }
.staff-sub { text-align: center; color: var(--ink-soft); margin-bottom: 36px; }
.dayoff-list { list-style: none; padding: 0; margin: 24px 0 0; }
.dayoff-list li {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 4px; border-bottom: 1px dotted var(--line); font-size: 0.97rem;
}
.dayoff-list .open-btn {
  background: none; border: 1px solid var(--gold); color: var(--gold-dark);
  border-radius: 3px; padding: 4px 14px; cursor: pointer; font-family: "Jost", sans-serif;
}
.dayoff-list .open-btn:hover { background: var(--gold); color: #fff; }
.staff-msg { font-size: 0.92rem; margin-top: 14px; }
.staff-msg.ok { color: #3a7d44; }
.staff-msg.err { color: #a33; }
</style>
</head>
<body>

<div class="staff-wrap">
  <a href="index.html" class="logo" style="display:block;text-align:center;margin-bottom:28px"><img src="images/logo.png" alt="Ilutegu" style="height:44px;width:auto;margin:0 auto"></a>
  <h1>Vaba päeva sulgemine</h1>
  <p class="staff-sub">Sulge päev, mil sa broneeringuid vastu ei võta.</p>

  <div class="booking-card">
    <div class="booking-grid">
      <div class="form-row">
        <label for="stWorker">Teenindaja</label>
        <select id="stWorker"><option value="" disabled selected>Vali…</option></select>
      </div>
      <div class="form-row">
        <label for="stPin">PIN-kood</label>
        <input type="password" id="stPin" inputmode="numeric" autocomplete="off">
      </div>
    </div>

    <div class="form-row">
      <label for="stDate">Kuupäev</label>
      <input type="date" id="stDate">
    </div>
    <div class="form-row">
      <label for="stReason">Põhjus (valikuline, näeb ainult salong)</label>
      <input type="text" id="stReason" placeholder="nt puhkus">
    </div>

    <button class="btn btn-gold booking-submit" id="stClose">Sulge päev</button>
    <p class="staff-msg" id="stMsg" hidden></p>

    <div id="stListWrap" hidden>
      <h3 style="margin-top:32px">Minu suletud päevad</h3>
      <ul class="dayoff-list" id="stList"></ul>
    </div>

    <div id="stBookingsWrap" hidden>
      <h3 style="margin-top:32px">Minu broneeringud</h3>
      <ul class="dayoff-list" id="stBookings"></ul>
    </div>
  </div>

  <p class="staff-link"><a href="index.html#broneeri"><svg width="13" height="13" viewBox="0 0 24 24" fill="#96733f" aria-hidden="true"><path d="M20 11H7.8l5.6-5.6L12 4l-8 8 8 8 1.4-1.4L7.8 13H20v-2z"/></svg>Tagasi broneerimise juurde</a></p>
</div>

<script>
const API = "https://ilubron.onrender.com/api/staff";
const PUBLIC_API = "https://ilubron.onrender.com/api/public";
const $ = id => document.getElementById(id);

fetch(PUBLIC_API + "/workers").then(r => r.json()).then(ws =>
  ws.forEach(w => $("stWorker").add(new Option(w.name, w.id)))
);

$("stDate").min = new Date().toISOString().split("T")[0];

function msg(text, ok) {
  const el = $("stMsg");
  el.textContent = text;
  el.className = "staff-msg " + (ok ? "ok" : "err");
  el.hidden = false;
}

function refreshList() {
  if (!$("stWorker").value || !$("stPin").value) return;
  fetch(API + "/dayoffs?workerId=" + $("stWorker").value + "&pin=" + encodeURIComponent($("stPin").value))
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(days => {
      const ul = $("stList");
      ul.innerHTML = "";
      days.forEach(d => {
        const li = document.createElement("li");
        const span = document.createElement("span");
        span.textContent = d.date + (d.reason ? " – " + d.reason : "") +
          (d.existingBookings > 0 ? " (" + d.existingBookings + " broneeringut!)" : "");
        const btn = document.createElement("button");
        btn.className = "open-btn";
        btn.textContent = "Ava uuesti";
        btn.onclick = () => {
          fetch(API + "/dayoffs?workerId=" + $("stWorker").value +
                "&pin=" + encodeURIComponent($("stPin").value) + "&date=" + d.date, { method: "DELETE" })
            .then(r => {
              if (r.ok) { msg("Päev " + d.date + " on jälle avatud.", true); refreshList(); }
              else { msg("Avamine ebaõnnestus (" + r.status + "). Proovi uuesti.", false); }
            })
            .catch(() => msg("Ühendus ebaõnnestus. Proovi uuesti.", false));
        };
        li.append(span, btn);
        ul.appendChild(li);
      });
      $("stListWrap").hidden = false;
    }).catch(() => {});
}

$("stClose").addEventListener("click", () => {
  if (!$("stWorker").value || !$("stPin").value || !$("stDate").value) {
    msg("Vali teenindaja, sisesta PIN ja kuupäev.", false);
    return;
  }
  fetch(API + "/dayoffs", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      workerId: Number($("stWorker").value),
      pin: $("stPin").value,
      date: $("stDate").value,
      reason: $("stReason").value || null
    })
  }).then(res => res.json().then(data => ({ ok: res.ok, status: res.status, data })))
    .then(({ ok, status, data }) => {
      if (!ok) {
        msg(status === 401 ? "Vale PIN-kood." : (data.detail || "Sulgemine ebaõnnestus."), false);
        return;
      }
      let text = "Päev " + data.date + " on broneeringutele suletud.";
      if (data.existingBookings > 0) {
        text += " NB! Sel päeval on juba " + data.existingBookings +
                " broneering(ut) – palun teavita kliente ise, need ei tühistu automaatselt.";
      }
      msg(text, true);
      refreshList();
    }).catch(() => msg("Ühendus ebaõnnestus. Proovi uuesti.", false));
});

function refreshBookings() {
  if (!$("stWorker").value || !$("stPin").value) return;
  const auth = "workerId=" + $("stWorker").value + "&pin=" + encodeURIComponent($("stPin").value);
  fetch(API + "/bookings?" + auth)
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(bookings => {
      const ul = $("stBookings");
      ul.innerHTML = "";
      if (!bookings.length) {
        const li = document.createElement("li");
        li.textContent = "Tulevasi broneeringuid pole.";
        ul.appendChild(li);
      }
      bookings.forEach(b => {
        const li = document.createElement("li");
        const span = document.createElement("span");
        span.textContent = b.date + " " + b.startTime.slice(0, 5) + "–" + b.endTime.slice(0, 5) +
          " · " + b.serviceName + " · " + b.customerName + " (" + b.customerPhone + ")";
        const btn = document.createElement("button");
        btn.className = "open-btn";
        btn.textContent = "Tühista";
        btn.onclick = () => {
          if (!confirm("Tühistan broneeringu: " + b.date + " " + b.startTime.slice(0, 5) +
                       " " + b.customerName + "? Aeg muutub teistele broneeritavaks. NB! Teavita klienti ise.")) return;
          fetch(API + "/bookings/" + b.id + "/cancel?" + auth, { method: "PATCH" })
            .then(r => {
              if (r.ok) { msg("Broneering tühistatud, aeg on jälle vaba.", true); refreshBookings(); }
              else { msg("Tühistamine ebaõnnestus (" + r.status + ").", false); }
            })
            .catch(() => msg("Ühendus ebaõnnestus. Proovi uuesti.", false));
        };
        li.append(span, btn);
        ul.appendChild(li);
      });
      $("stBookingsWrap").hidden = false;
    }).catch(() => {});
}

function refreshAll() { refreshList(); refreshBookings(); }
$("stPin").addEventListener("change", refreshAll);
$("stWorker").addEventListener("change", refreshAll);
</script>
</body>
</html>
